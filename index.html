<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OIL BUSTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════
   OIL BUSTER — Comic Pixel Style
   ═══════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --px: 'Press Start 2P', monospace;
  --black:  #0a0a0f;
  --dark:   #12121a;
  --panel:  #1a1a2e;
  --border: #4aeeff;
  --cyan:   #4aeeff;
  --yellow: #ffe347;
  --orange: #ff8c00;
  --red:    #ff2255;
  --green:  #22ff88;
  --purple: #cc44ff;
  --white:  #f0f8ff;
  --dim:    #556677;
}

html,body{
  width:100%;height:100%;
  background:var(--black);
  font-family:var(--px);
  overflow:hidden;
  user-select:none;
  color:var(--white);
  image-rendering:pixelated;
}

/* ── LAYOUT ── */
#app{
  display:flex;
  flex-direction:column;
  width:100vw;
  height:100vh;
}

/* ── TOP HUD ── */
#hud-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  padding:6px 10px 5px;
  background:var(--panel);
  border-bottom:3px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
}

.hud-pill{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--dark);
  border:2px solid var(--border);
  padding:4px 8px;
  box-shadow:3px 3px 0 var(--border);
}

.pill-label{
  font-size:6px;
  color:var(--cyan);
  letter-spacing:1px;
}
.pill-val{
  font-size:14px;
  color:var(--white);
  letter-spacing:1px;
}
.pill-val.yellow{color:var(--yellow);}
.pill-val.orange{color:var(--orange);}

/* Timer box */
#timer-box{
  display:flex;
  align-items:baseline;
  gap:5px;
  background:var(--dark);
  border:3px solid var(--yellow);
  padding:4px 12px;
  box-shadow:4px 4px 0 var(--yellow);
}
#h-time{
  font-size:22px;
  color:var(--yellow);
  text-shadow:0 0 8px var(--yellow);
}
#timer-box .pill-label{color:var(--yellow);}

/* HP hearts */
#h-hp{display:flex;gap:4px;align-items:center;}
.hp-px{
  width:14px;height:14px;
  background:var(--red);
  clip-path:polygon(25% 0%,75% 0%,100% 25%,100% 50%,50% 100%,0% 50%,0% 25%);
  image-rendering:pixelated;
  box-shadow:2px 2px 0 #880022;
}
.hp-px.empty{
  background:var(--dark);
  box-shadow:2px 2px 0 #222;
  clip-path:polygon(25% 0%,75% 0%,100% 25%,100% 50%,50% 100%,0% 50%,0% 25%);
}

/* ── BADGE ROW ── */
#badge-row{
  background:var(--dark);
  border-bottom:2px solid #223;
  padding:3px 10px;
  min-height:20px;
  flex-shrink:0;
  display:flex;
  align-items:center;
}
#upgrade-badges{display:flex;gap:5px;flex-wrap:wrap;}
.upg-badge{
  font-size:8px;
  padding:2px 6px;
  background:var(--panel);
  border:2px solid;
  box-shadow:2px 2px 0 currentColor;
  color:var(--white);
  cursor:default;
}

/* ── BOSS BAR ── */
#boss-hp-wrap{
  display:flex;align-items:center;gap:8px;
  padding:4px 10px;
  background:var(--panel);
  border-bottom:2px solid var(--purple);
  flex-shrink:0;
}
#boss-hp-label{font-size:8px;color:var(--purple);text-shadow:0 0 6px var(--purple);white-space:nowrap;animation:px-blink .7s step-end infinite;}
#boss-hp-track{flex:1;height:10px;background:var(--dark);border:2px solid var(--purple);}
#boss-hp-bar{height:100%;width:100%;background:var(--purple);transition:width .15s;}
#boss-hp-text{font-size:7px;color:var(--purple);white-space:nowrap;min-width:90px;text-align:right;}

/* ── CANVAS AREA ── */
#canvas-wrap{
  flex:1;
  display:flex;
  align-items:stretch;
  justify-content:stretch;
  overflow:hidden;
  background:var(--black);
  position:relative;
}

#gc{
  display:block;
  /* canvas fills entire wrap area */
  width:100% !important;
  height:100% !important;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  border-left:3px solid var(--border);
  border-right:3px solid var(--border);
}

/* ── BOTTOM HUD ── */
#hud-bot{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  background:var(--panel);
  border-top:3px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
}

.skill-pill{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--dark);
  border:2px solid var(--cyan);
  padding:4px 8px;
  box-shadow:3px 3px 0 var(--cyan);
  flex-shrink:0;
}
.skill-pill.cd{border-color:var(--dim);box-shadow:3px 3px 0 var(--dim);}

.sp-key{
  font-size:8px;
  color:var(--cyan);
  background:var(--panel);
  border:2px solid var(--cyan);
  padding:3px 5px;
  box-shadow:2px 2px 0 var(--cyan);
  white-space:nowrap;
}

.sp-body{display:flex;flex-direction:column;gap:3px;min-width:140px;}

.sp-label{
  font-size:7px;
  color:var(--cyan);
  letter-spacing:1px;
  white-space:nowrap;
}
.sp-label.cd{color:var(--dim);}
.sp-label.active{color:var(--green);text-shadow:0 0 6px var(--green);}

.sp-bar-bg{height:5px;background:#111;border:1px solid #334;}
.sp-bar{
  height:100%;width:100%;
  background:var(--cyan);
  box-shadow:0 0 4px var(--cyan);
  transition:width .1s linear;
}
.sp-bar.cd{background:var(--orange);box-shadow:none;}
.sp-bar.green{background:var(--green);}
.sp-bar.green.cd{background:var(--dim);box-shadow:none;}
.sp-bar.active{background:var(--green);box-shadow:0 0 6px var(--green);}

#ctrl-hints{
  display:flex;gap:8px;flex-wrap:wrap;
  font-size:6px;color:var(--dim);
  margin-left:auto;
}

/* ══════════════════════════
   UPGRADE OVERLAY
══════════════════════════ */
#upgrade-overlay{
  position:fixed;inset:0;
  background:rgba(5,5,15,0.93);
  display:flex;align-items:center;justify-content:center;
  z-index:300;
  animation:px-fade .15s steps(3) forwards;
}
#upgrade-overlay.hidden{display:none;}

@keyframes px-fade{from{opacity:0;}to{opacity:1;}}

#upgrade-box{
  display:flex;flex-direction:column;align-items:center;
  gap:16px;
  width:min(98vw,800px);
  padding:24px 16px;
  background:var(--panel);
  border:4px solid var(--cyan);
  box-shadow:6px 6px 0 var(--cyan), 12px 12px 0 rgba(74,238,255,0.15);
}

.px-title{
  font-size:22px;
  color:var(--cyan);
  text-shadow:4px 4px 0 #00667788, 0 0 20px var(--cyan);
  letter-spacing:4px;
  animation:px-blink 1.2s step-end infinite;
}

#upgrade-sub{
  font-size:8px;
  color:var(--dim);
  letter-spacing:2px;
}

#upgrade-cards{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  width:100%;
}

/* ── Upgrade card ── */
.upg-card{
  flex:1;
  min-width:190px;max-width:220px;
  display:flex;flex-direction:column;
  align-items:center;
  gap:10px;
  padding:18px 14px;
  background:var(--dark);
  border:3px solid var(--card-color,#4aeeff);
  box-shadow:4px 4px 0 var(--card-color,#4aeeff);
  cursor:pointer;
  transition:transform .1s steps(2), box-shadow .1s steps(2);
  position:relative;
}
.upg-card:hover{
  transform:translate(-2px,-2px);
  box-shadow:6px 6px 0 var(--card-color,#4aeeff);
}
.upg-card:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--card-color,#4aeeff);}

.upg-icon{font-size:28px;image-rendering:pixelated;}
.upg-name{
  font-size:9px;
  color:var(--card-color,#4aeeff);
  text-align:center;
  letter-spacing:1px;
  line-height:1.6;
  text-shadow:2px 2px 0 rgba(0,0,0,0.8);
}
.upg-stack{
  font-size:7px;
  margin-left:4px;
  background:var(--card-color,#4aeeff);
  color:#000;
  padding:0 4px;
}
.upg-desc{
  font-size:7px;
  color:#aabbcc;
  text-align:center;
  line-height:1.8;
  letter-spacing:.5px;
}
.upg-tag{
  font-size:6px;
  letter-spacing:2px;
  padding:2px 6px;
  background:#111;
  border:2px solid var(--cyan);
  color:var(--cyan);
}
.upg-tag.one{border-color:var(--orange);color:var(--orange);}

/* ── GAME OVER ── */
#overlay{
  position:fixed;inset:0;
  background:rgba(5,5,15,0.92);
  display:flex;align-items:center;justify-content:center;
  z-index:200;
}
#overlay.hidden{display:none;}

#ov-box{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  padding:40px 50px;
  background:var(--panel);
  border:4px solid var(--red);
  box-shadow:6px 6px 0 var(--red), 12px 12px 0 rgba(255,34,85,0.2);
}

#ov-title{
  font-size:24px;color:var(--red);
  text-shadow:4px 4px 0 #660011, 0 0 20px var(--red);
}

.ov-row{
  display:flex;gap:20px;align-items:baseline;
  font-size:10px;color:var(--white);
  letter-spacing:2px;
}
.ov-row span:first-child{color:var(--dim);}
.ov-row span:last-child{font-size:16px;color:var(--yellow);}

#btn-restart{
  margin-top:8px;
  font-family:var(--px);
  font-size:11px;
  letter-spacing:2px;
  background:var(--dark);
  border:3px solid var(--cyan);
  color:var(--cyan);
  padding:10px 20px;
  cursor:pointer;
  box-shadow:4px 4px 0 var(--cyan);
  transition:transform .1s steps(2),box-shadow .1s steps(2);
}
#btn-restart:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--cyan);}
#btn-restart:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--cyan);}

/* ── LEVEL FLASH ── */
#lvl-flash{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  color:var(--green);
  text-shadow:4px 4px 0 #006633, 0 0 30px var(--green);
  letter-spacing:6px;
  pointer-events:none;z-index:100;
  animation:lvl-pop .25s steps(3) forwards, lvl-fade 1.4s .2s steps(6) forwards;
}
#lvl-flash.hidden{display:none;}

/* ── DAMAGE FLASH ── */
#canvas-wrap.dmg-flash{animation:px-dmg .3s steps(3);}
@keyframes px-dmg{
  0%,100%{border-color:var(--border);}
  50%{border-color:var(--red);box-shadow:0 0 0 4px var(--red) inset;}
}

/* ── ANIMATIONS ── */
@keyframes px-blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes lvl-pop{from{transform:scale(0.4);}to{transform:scale(1.05);}}
@keyframes lvl-fade{from{opacity:1;}to{opacity:0;}}

</style>
</head>
<body>
<div id="app">
  <header id="hud-top">
    <div class="hud-pill"><span class="pill-label">LVL</span><span class="pill-val" id="h-level">1</span></div>
    <div class="hud-pill"><span class="pill-label">SCORE</span><span class="pill-val yellow" id="h-score">0</span></div>
    <div id="timer-box"><span id="h-time">60</span><span class="pill-label">SEC</span></div>
    <div class="hud-pill"><span class="pill-label">OIL</span><span class="pill-val orange" id="h-oil">0</span></div>
    <div class="hud-pill"><span class="pill-label">HP</span><div id="h-hp"></div></div>
  </header>
  <div id="badge-row"><div id="upgrade-badges"></div></div>
  <div id="boss-hp-wrap" style="display:none">
    <span id="boss-hp-label">★ BOSS</span>
    <div id="boss-hp-track"><div id="boss-hp-bar"></div></div>
    <span id="boss-hp-text"></span>
  </div>
  <div id="canvas-wrap"><canvas id="gc"></canvas></div>
  <footer id="hud-bot">
    <div class="skill-pill" id="sp-c">
      <span class="sp-key">[C]</span>
      <div class="sp-body">
        <div class="sp-label" id="skill-label">AREA CLEAR — READY!</div>
        <div class="sp-bar-bg"><div class="sp-bar" id="skill-bar"></div></div>
      </div>
    </div>
    <div class="skill-pill" id="sp-v">
      <span class="sp-key">[V]</span>
      <div class="sp-body">
        <div class="sp-label" id="skill-label-v">SPEED BOOST — READY!</div>
        <div class="sp-bar-bg"><div class="sp-bar green" id="skill-bar-v"></div></div>
      </div>
    </div>
    <div id="ctrl-hints">
      <span>WASD/ARROWS</span><span>SPACE=SHOOT</span><span>[C]=AREA</span><span>[V]=BOOST</span>
    </div>
  </footer>
  <div id="upgrade-overlay" class="hidden">
    <div id="upgrade-box">
      <div id="upgrade-title" class="px-title">UPGRADE!</div>
      <div id="upgrade-sub">PILIH 1 PERK — GAME PAUSE</div>
      <div id="upgrade-cards"></div>
    </div>
  </div>
  <div id="overlay" class="hidden">
    <div id="ov-box">
      <div id="ov-title" class="px-title">GAME OVER</div>
      <div class="ov-row"><span>SCORE</span><span id="ov-score">0</span></div>
      <div class="ov-row"><span>LEVEL</span><span id="ov-lvl">1</span></div>
      <button id="btn-restart">[ RESTART ]</button>
    </div>
  </div>
  <div id="lvl-flash" class="hidden">LEVEL UP!</div>
</div>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  OIL BUSTER — v5  Comic Pixel Edition
//  • Canvas fills full available area (no empty space)
//  • Cell size 4px, grid 180×120 → crispy pixel look
//  • All sprites drawn as chunky pixel art shapes
//  • Full upgrade system preserved
// ═══════════════════════════════════════════════════════

// ─── GRID / WORLD ────────────────────────────────────
const ROWS = 120;
const COLS = 180;
const CS   = 4;          // px per cell — 4 = chunky pixel
const W    = COLS * CS;  // 720
const H    = ROWS * CS;  // 480

// ─── GAME PARAMS ─────────────────────────────────────
const BASE_TIME_SEC  = 60;
const BASE_SPREAD_MS = 3500;
const BASE_SPREAD_CH = 0.12;
const CLEAN_SCORE    = 1;
const ENEMY_SCORE    = 10;
const BOSS_SCORE     = 50;
const PLAYER_CELLS   = 4;
const ENEMY_CELLS    = 5;
const BOSS_CELLS     = 12;
const BOSS_HP_BASE   = 20;

// ─── UPGRADE DATABASE ────────────────────────────────
const UPGRADE_DB = [
  { id:'cooldownReduction', name:'FASTER CLEAN',    icon:'⏱', desc:'Cooldown Area Clear -0.2 detik',      stackable:true,  color:'#4aeeff' },
  { id:'areaExpansion',     name:'WIDER AREA',       icon:'🌊', desc:'Radius Area Clear +2 sel',            stackable:true,  color:'#22ff88' },
  { id:'boostDuration',     name:'LONG BOOST',       icon:'💨', desc:'Durasi Speed Boost +1 detik',         stackable:true,  color:'#00ccff' },
  { id:'doubleShot',        name:'DOUBLE SHOT',      icon:'🔫', desc:'Tembak 2 peluru paralel',             stackable:false, color:'#ffe347' },
  { id:'tripleShot',        name:'TRIPLE SHOT',      icon:'💥', desc:'Tembak 3 peluru (butuh Double)',      stackable:false, color:'#ff8c00', requires:'doubleShot' },
  { id:'slowSpread',        name:'CONTAINMENT',      icon:'🛑', desc:'Penyebaran minyak -2% per stack',     stackable:true,  color:'#ff2255' },
  { id:'extraHp',           name:'EXTRA HULL',       icon:'❤️', desc:'+1 HP maks dan pulihkan 1 HP',        stackable:true,  color:'#ff5577' },
  { id:'boostCooldown',     name:'NITRO REFUEL',     icon:'⚡', desc:'Cooldown Speed Boost -2 detik',       stackable:true,  color:'#aaddff' },
  { id:'bulletSpeed',       name:'HIGH VELOCITY',    icon:'🎯', desc:'Kecepatan peluru +30%',               stackable:true,  color:'#ffff88' },
  { id:'moveSpeed',         name:'ENGINE UPGRADE',   icon:'🚀', desc:'Kecepatan gerak +15%',                stackable:true,  color:'#44ffcc' },
];

// ─── PIXEL COLORS ─────────────────────────────────────
const PC = {
  // Water
  waterDeep:  '#0d1b4b',
  waterShallow:'#1a3a7a',
  // Land / border
  land:       '#4a3520',
  landLight:  '#6b5030',
  // Oil
  oil:        '#2a1500',
  oilMid:     '#5a2800',
  oilLight:   '#8b4e0a',
  oilSheen:   '#c07010',
  // Player
  pHull:      '#00c8a8',
  pDeck:      '#00ffcc',
  pCabin:     '#e0f8f4',
  pWindow:    '#88ddff',
  pOutline:   '#004433',
  // Enemy
  eHull:      '#cc1133',
  eDark:      '#660011',
  eAccent:    '#ff4466',
  eLight:     '#ff8844',
  // Boss
  bCore:      '#7700cc',
  bDark:      '#330055',
  bGlow:      '#dd44ff',
  bAccent:    '#cc44ff',
  // Bullets
  bPlayer:    '#ffe800',
  bEnemy:     '#ff4422',
  bBoss:      '#ee00ff',
  // Heal
  heal:       '#22ff88',
  healDark:   '#008844',
  // Grid
  grid:       '#0a1230',
  // Wave
  wave:       '#1e4080',
  waveLight:  '#2855a0',
};

// ─── UTILS ───────────────────────────────────────────
const $     = id => document.getElementById(id);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const rand  = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ─── BULLET ──────────────────────────────────────────
class Bullet{
  constructor(r,c,dr,dc,isPlayer,speed,isBoss=false){
    this.r=r;this.c=c;this.dr=dr;this.dc=dc;
    this.isPlayer=isPlayer;this.speed=speed;this.isBoss=isBoss;this.alive=true;
  }
  update(){
    this.r+=this.dr*this.speed;this.c+=this.dc*this.speed;
    if(this.r<0||this.r>=ROWS||this.c<0||this.c>=COLS) this.alive=false;
  }
  px(){return Math.floor(this.c)*CS+CS/2;}
  py(){return Math.floor(this.r)*CS+CS/2;}
}

// ─── HEAL ORB ────────────────────────────────────────
class HealOrb{
  constructor(r,c){this.r=r;this.c=c;this.alive=true;this.t=performance.now();}
}

// ══════════════════════════════════════════════════════
//  GAME
// ══════════════════════════════════════════════════════
class Game{
  constructor(){
    this.canvas = $('gc');
    this.ctx    = this.canvas.getContext('2d');
    // Set internal resolution
    this.canvas.width  = W;
    this.canvas.height = H;
    // CSS sizing = handled by fitCanvas()

    this.keys   = new Set();
    this.level  = 1;
    this.paused = false;

    this.upgrades = {
      cooldownReduction:0, areaExpansion:0, boostDuration:0,
      doubleShot:0, tripleShot:0, slowSpread:0,
      extraHp:0, boostCooldown:0, bulletSpeed:0, moveSpeed:0,
    };

    this._buildWaterSnap();
    this._bindInput();
    this._init();
    this._tick = this._tick.bind(this);
    requestAnimationFrame(this._tick);
  }

  // ── Derived stats ────────────────────────────────
  get skillCCd()  { return Math.max(2000, 10000 - this.upgrades.cooldownReduction*200); }
  get skillArea() { return (10+Math.floor((this.level-1)/2)) + this.upgrades.areaExpansion*2; }
  get skillVDur() { return 3000 + this.upgrades.boostDuration*1000; }
  get skillVCd()  { return Math.max(5000, 15000 - this.upgrades.boostCooldown*2000); }
  get spreadCh()  { return Math.max(0.01, BASE_SPREAD_CH - this.upgrades.slowSpread*0.02); }
  get bulletSpd() { return 1.8 * (1 + this.upgrades.bulletSpeed*0.3); }
  get movDelay()  { return Math.max(10, Math.round(35 / (1 + this.upgrades.moveSpeed*0.15))); }

  // ── Build static water layer ─────────────────────
  _buildWaterSnap(){
    this.land = Array.from({length:ROWS}, (_,r)=>
      new Uint8Array(COLS).map((_,c) => (r===0||r===ROWS-1||c===0||c===COLS-1)?1:0)
    );
    // Build ImageData for water + land
    const img = this.ctx.createImageData(W, H);
    const d   = img.data;
    for(let r=0;r<ROWS;r++){
      // water: two-tone checkerboard for pixel feel
      for(let c=0;c<COLS;c++){
        const isLand = this.land[r][c];
        const checker = (Math.floor(r/4)+Math.floor(c/4))%2===0;
        let R,G,B;
        if(isLand){
          R=checker?0x4a:0x5a; G=checker?0x35:0x40; B=checker?0x20:0x28;
        } else {
          const t=r/ROWS;
          const base = checker ? [13,27,75] : [20,40,100];
          R=Math.round(base[0]+t*8); G=Math.round(base[1]+t*30); B=Math.round(base[2]+t*50);
        }
        for(let py=r*CS;py<(r+1)*CS;py++){
          for(let px=c*CS;px<(c+1)*CS;px++){
            const i=(py*W+px)*4;
            d[i]=R;d[i+1]=G;d[i+2]=B;d[i+3]=255;
          }
        }
      }
    }
    this.waterSnap = img;

    // Grid lines on top — drawn once into a separate canvas
    const gc = document.createElement('canvas');
    gc.width=W;gc.height=H;
    const gx = gc.getContext('2d');
    gx.putImageData(img,0,0);
    gx.strokeStyle = PC.grid;
    gx.lineWidth   = 1;
    gx.globalAlpha = 0.5;
    for(let r=0;r<=ROWS;r+=4){gx.beginPath();gx.moveTo(0,r*CS);gx.lineTo(W,r*CS);gx.stroke();}
    for(let c=0;c<=COLS;c+=4){gx.beginPath();gx.moveTo(c*CS,0);gx.lineTo(c*CS,H);gx.stroke();}
    gx.globalAlpha=1;
    this.bgSnap = gx.getImageData(0,0,W,H);
  }

  // ── Init state ───────────────────────────────────
  _init(){
    this.grid    = Array.from({length:ROWS},()=>new Uint8Array(COLS));
    this.bullets = []; this.enemies = []; this.orbs = []; this.boss = null;

    this.maxHp = 5 + Math.floor((this.level-1)/2) + this.upgrades.extraHp;
    this.hp    = this.maxHp;
    this.score = 0;
    this.gameOver = false;
    this.paused   = false;

    this.pr = Math.floor(ROWS/2);
    this.pc = Math.floor(COLS/2);

    this.totalTime = BASE_TIME_SEC + (this.level-1)*20;
    this.timeLeft  = this.totalTime;
    this.startMs   = performance.now();

    this.lastSpreadMs  = performance.now();
    this.enemyMoveMs   = performance.now();
    this.lastEShotMs   = performance.now();
    this.lastBShotMs   = performance.now();
    this.bossMoveMs    = performance.now();

    this.skillCUsedMs  = -999999;
    this.skillVUsedMs  = -999999;
    this.moveAccMs     = 0;
    this.waveT         = 0;
    this.skillCFlashMs = null;
    this._skillCHalf   = 10;

    this._placeOil();
    this._spawnEnemies();
    this._updateHUD();
  }

  // ── Oil ─────────────────────────────────────────
  _placeOil(){
    for(let i=0;i<this.level;i++){
      let r,c,t=0;
      do{r=rand(2,ROWS-3);c=rand(2,COLS-3);t++;}while(this.grid[r][c]&&t<100);
      this._spillSource(r,c);
    }
  }
  _spillSource(r,c){
    const sz=rand(15,50),stack=[[r,c]],vis=new Set();
    while(stack.length&&vis.size<sz){
      const[rr,cc]=stack.pop();
      if(rr<1||rr>ROWS-2||cc<1||cc>COLS-2) continue;
      const k=rr*COLS+cc;
      if(vis.has(k)) continue;
      this.grid[rr][cc]=1;vis.add(k);
      const ns=shuffle([[rr+1,cc],[rr-1,cc],[rr,cc+1],[rr,cc-1]]);
      for(let i=0;i<rand(1,3);i++) stack.push(ns[i]);
    }
  }
  _anyOil(){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(this.grid[r][c])return true;return false;}
  _oilCount(){let n=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(this.grid[r][c])n++;return n;}

  // ── Enemies ─────────────────────────────────────
  _spawnEnemies(){
    this.enemies=[]; this.boss=null;
    if(this.level%10===0){
      this.boss={r:rand(15,ROWS-15-BOSS_CELLS),c:rand(15,COLS-15-BOSS_CELLS),
        hp:BOSS_HP_BASE*(this.level/10), maxHp:BOSS_HP_BASE*(this.level/10), phase:0};
      return;
    }
    const n=this.level<5?0:this.level===5?1:Math.max(1,Math.floor((this.level-4)/2));
    for(let i=0;i<n;i++)
      this.enemies.push({r:rand(8,ROWS-8-ENEMY_CELLS),c:rand(8,COLS-8-ENEMY_CELLS)});
  }

  // ── Input ────────────────────────────────────────
  _bindInput(){
    document.addEventListener('keydown',e=>{
      if(this.paused) return;
      this.keys.add(e.key);
      if((e.key==='c'||e.key==='C')&&!this.gameOver) this._skillC();
      if((e.key==='v'||e.key==='V')&&!this.gameOver) this._skillV();
      if(e.key===' '){e.preventDefault();if(!this.gameOver)this._shoot();}
      if((e.key==='r'||e.key==='R')&&this.gameOver) this.restart();
    });
    document.addEventListener('keyup',e=>this.keys.delete(e.key));
    $('btn-restart')?.addEventListener('click',()=>this.restart());
  }
  _getDir(){
    if(this.keys.has('ArrowUp')   ||this.keys.has('w')) return[-1,0];
    if(this.keys.has('ArrowDown') ||this.keys.has('s')) return[1,0];
    if(this.keys.has('ArrowLeft') ||this.keys.has('a')) return[0,-1];
    if(this.keys.has('ArrowRight')||this.keys.has('d')) return[0,1];
    return null;
  }

  // ── Movement ─────────────────────────────────────
  _processMove(dt){
    if(this.gameOver||this.paused) return;
    const now=performance.now();
    const boosted=now-this.skillVUsedMs<this.skillVDur;
    const delay=boosted?Math.round(this.movDelay*0.35):this.movDelay;
    this.moveAccMs+=dt;
    if(this.moveAccMs<delay) return;
    this.moveAccMs=0;
    const dir=this._getDir(); if(!dir) return;
    this.pr=clamp(this.pr+dir[0],1,ROWS-1-PLAYER_CELLS);
    this.pc=clamp(this.pc+dir[1],1,COLS-1-PLAYER_CELLS);
    const cl=this._cleanArea(this.pr,this.pc,PLAYER_CELLS);
    if(cl){this.score+=cl*CLEAN_SCORE;if(!this._anyOil())this._nextLevel();}
    this._pickOrbs();
  }
  _cleanArea(row,col,size){
    let n=0;
    for(let r=row;r<row+size;r++)
      for(let c=col;c<col+size;c++)
        if(r>0&&r<ROWS-1&&c>0&&c<COLS-1&&this.grid[r][c]){this.grid[r][c]=0;n++;}
    return n;
  }

  // ── Skill C ─────────────────────────────────────
  _skillC(){
    const now=performance.now();
    if(now-this.skillCUsedMs<this.skillCCd) return;
    this.skillCUsedMs=now;
    const half=this.skillArea;
    const cr=this.pr+Math.floor(PLAYER_CELLS/2);
    const cc=this.pc+Math.floor(PLAYER_CELLS/2);
    let n=0;
    for(let r=cr-half;r<cr+half;r++)
      for(let c=cc-half;c<cc+half;c++)
        if(r>0&&r<ROWS-1&&c>0&&c<COLS-1&&this.grid[r][c]){this.grid[r][c]=0;n++;}
    if(n){this.score+=n*CLEAN_SCORE;if(!this._anyOil())this._nextLevel();}
    this.skillCFlashMs=now; this._skillCHalf=half;
  }

  // ── Skill V ─────────────────────────────────────
  _skillV(){
    const now=performance.now();
    if(now-this.skillVUsedMs<this.skillVCd) return;
    this.skillVUsedMs=now;
  }

  // ── Shoot ────────────────────────────────────────
  _shoot(){
    const dir=this._getDir()||[-1,0];
    const cr=this.pr+Math.floor(PLAYER_CELLS/2);
    const cc=this.pc+Math.floor(PLAYER_CELLS/2);
    const sp=this.bulletSpd;
    let count=this.upgrades.tripleShot>=1?3:this.upgrades.doubleShot>=1?2:1;
    if(count===1){
      this.bullets.push(new Bullet(cr,cc,dir[0],dir[1],true,sp));
    } else if(count===2){
      const p=[-dir[1],dir[0]];
      this.bullets.push(new Bullet(cr+p[0]*1.5,cc+p[1]*1.5,dir[0],dir[1],true,sp));
      this.bullets.push(new Bullet(cr-p[0]*1.5,cc-p[1]*1.5,dir[0],dir[1],true,sp));
    } else {
      this.bullets.push(new Bullet(cr,cc,dir[0],dir[1],true,sp));
      const ang=Math.atan2(dir[0],dir[1]);
      for(const da of[-0.22,0.22])
        this.bullets.push(new Bullet(cr,cc,Math.sin(ang+da),Math.cos(ang+da),true,sp));
    }
  }
  _enemyShoot(now){
    if(!this.enemies.length||this.gameOver||this.paused) return;
    if(now-this.lastEShotMs<1500) return;
    this.lastEShotMs=now;
    for(const e of this.enemies){
      const dR=this.pr-e.r, dC=this.pc-e.c;
      let dr=0,dc=0;
      if(Math.abs(dR)>=Math.abs(dC)) dr=Math.sign(dR); else dc=Math.sign(dC);
      if(!dr&&!dc) dr=1;
      this.bullets.push(new Bullet(e.r+Math.floor(ENEMY_CELLS/2),e.c+Math.floor(ENEMY_CELLS/2),dr,dc,false,1.1));
    }
  }
  _bossShoot(now){
    if(!this.boss||this.gameOver||this.paused) return;
    if(now-this.lastBShotMs<800) return;
    this.lastBShotMs=now;
    const b=this.boss;
    const cr=b.r+Math.floor(BOSS_CELLS/2),cc=b.c+Math.floor(BOSS_CELLS/2);
    const ang=Math.atan2(this.pr-b.r,this.pc-b.c);
    for(const da of[0,-0.3,0.3])
      this.bullets.push(new Bullet(cr,cc,Math.sin(ang+da),Math.cos(ang+da),false,1.4,true));
  }

  // ── Bullet update ────────────────────────────────
  _updateBullets(){
    for(const b of this.bullets){
      if(!b.alive) continue;
      b.update();
      const r=Math.floor(b.r),c=Math.floor(b.c);
      if(r<0||r>=ROWS||c<0||c>=COLS){b.alive=false;continue;}
      if(b.isPlayer){
        if(this.grid[r][c]){this.grid[r][c]=0;this.score+=CLEAN_SCORE;}
        for(let i=this.enemies.length-1;i>=0;i--){
          const e=this.enemies[i];
          if(r>=e.r&&r<e.r+ENEMY_CELLS&&c>=e.c&&c<e.c+ENEMY_CELLS){
            this.enemies.splice(i,1);b.alive=false;this.score+=ENEMY_SCORE;
            this.orbs.push(new HealOrb(e.r+Math.floor(ENEMY_CELLS/2),e.c+Math.floor(ENEMY_CELLS/2)));
            break;
          }
        }
        if(b.alive&&this.boss){
          const bs=this.boss;
          if(r>=bs.r&&r<bs.r+BOSS_CELLS&&c>=bs.c&&c<bs.c+BOSS_CELLS){
            bs.hp--;b.alive=false;
            if(bs.hp<=0){
              this.score+=BOSS_SCORE;
              this.orbs.push(new HealOrb(bs.r+BOSS_CELLS/2,bs.c+BOSS_CELLS/2-1));
              this.orbs.push(new HealOrb(bs.r+BOSS_CELLS/2,bs.c+BOSS_CELLS/2+1));
              this.boss=null;
              if(!this._anyOil()) this._nextLevel();
            }
          }
        }
      } else {
        if(r>=this.pr&&r<this.pr+PLAYER_CELLS&&c>=this.pc&&c<this.pc+PLAYER_CELLS){
          b.alive=false;this.hp--;this._flashDmg();
          if(this.hp<=0){this.hp=0;this.gameOver=true;}
        }
      }
    }
    this.bullets=this.bullets.filter(b=>b.alive);
    const now=performance.now();
    this.orbs=this.orbs.filter(o=>o.alive&&now-o.t<8000);
  }
  _pickOrbs(){
    const cr=this.pr+Math.floor(PLAYER_CELLS/2),cc=this.pc+Math.floor(PLAYER_CELLS/2);
    for(const o of this.orbs){
      if(!o.alive) continue;
      if(Math.abs(cr-o.r)<=3&&Math.abs(cc-o.c)<=3){o.alive=false;this.hp=Math.min(this.maxHp,this.hp+1);}
    }
  }

  // ── Enemy update ─────────────────────────────────
  _updateEnemies(now){
    if(this.gameOver||this.paused) return;
    if(this.enemies.length&&now-this.enemyMoveMs>500){
      this.enemyMoveMs=now;
      for(const e of this.enemies){
        if(e.r<this.pr)e.r++;else if(e.r>this.pr)e.r--;
        if(e.c<this.pc)e.c++;else if(e.c>this.pc)e.c--;
        e.r=clamp(e.r,1,ROWS-1-ENEMY_CELLS);e.c=clamp(e.c,1,COLS-1-ENEMY_CELLS);
      }
    }
    if(this.boss&&now-this.bossMoveMs>700){
      this.bossMoveMs=now;const b=this.boss;
      if(b.r<this.pr)b.r++;else if(b.r>this.pr)b.r--;
      if(b.c<this.pc)b.c++;else if(b.c>this.pc)b.c--;
      b.r=clamp(b.r,1,ROWS-1-BOSS_CELLS);b.c=clamp(b.c,1,COLS-1-BOSS_CELLS);
      b.phase=(b.phase||0)+0.08;
    }
  }

  // ── Oil spread ───────────────────────────────────
  _spreadOil(now){
    if(this.paused||now-this.lastSpreadMs<BASE_SPREAD_MS) return;
    this.lastSpreadMs=now;
    const ch=this.spreadCh, oil=[];
    for(let r=1;r<ROWS-1;r++)
      for(let c=1;c<COLS-1;c++){
        if(!this.grid[r][c]) continue;
        for(const[nr,nc]of[[r-1,c],[r+1,c],[r,c-1],[r,c+1],[r-1,c-1],[r-1,c+1],[r+1,c-1],[r+1,c+1]])
          if(nr>0&&nr<ROWS-1&&nc>0&&nc<COLS-1&&!this.grid[nr][nc]&&Math.random()<ch)
            oil.push([nr,nc]);
      }
    for(const[nr,nc]of oil) this.grid[nr][nc]=1;
  }

  // ── Level ────────────────────────────────────────
  _nextLevel(){
    this.level++;
    const newMax=5+Math.floor((this.level-1)/2)+this.upgrades.extraHp;
    if(newMax>this.maxHp){const d=newMax-this.maxHp;this.maxHp=newMax;this.hp=Math.min(this.maxHp,this.hp+d);}
    this.totalTime=BASE_TIME_SEC+(this.level-1)*20;
    this.startMs=performance.now();
    this._placeOil();
    this._spawnEnemies();
    if(this.level>=2&&this.level%2===0){
      this.paused=true;
      this._showUpgradeMenu();
    } else {
      showLevelFlash(this.level);
    }
  }

  // ── Time ─────────────────────────────────────────
  _updateTime(now){
    if(this.gameOver||this.paused) return;
    this.timeLeft=Math.max(0,this.totalTime-(now-this.startMs)/1000);
    if(this.timeLeft<=0) this.gameOver=true;
  }

  // ── Upgrade system ───────────────────────────────
  _getUpgradeChoices(){
    const avail=UPGRADE_DB.filter(u=>{
      if(!u.stackable&&this.upgrades[u.id]>=1) return false;
      if(u.requires&&this.upgrades[u.requires]<1) return false;
      return true;
    });
    return shuffle([...avail]).slice(0,Math.min(3,avail.length));
  }
  _applyUpgrade(id){
    this.upgrades[id]=(this.upgrades[id]||0)+1;
    if(id==='extraHp'){this.maxHp++;this.hp=Math.min(this.maxHp,this.hp+1);}
  }
  _showUpgradeMenu(){
    const choices=this._getUpgradeChoices();
    if(!choices.length){this.paused=false;showLevelFlash(this.level);return;}
    const box=$('upgrade-cards');
    box.innerHTML='';
    $('upgrade-overlay').querySelector('#upgrade-title').textContent='UPGRADE!';
    $('upgrade-overlay').querySelector('#upgrade-sub').textContent=`LEVEL ${this.level} — PILIH 1 PERK`;
    choices.forEach(u=>{
      const cnt=this.upgrades[u.id];
      const card=document.createElement('div');
      card.className='upg-card';
      card.style.setProperty('--card-color',u.color);
      card.innerHTML=`
        <div class="upg-icon">${u.icon}</div>
        <div class="upg-name">${u.name}${u.stackable&&cnt>0?`<span class="upg-stack">×${cnt+1}</span>`:''}</div>
        <div class="upg-desc">${u.desc}</div>
        ${u.stackable?'<div class="upg-tag">STACKABLE</div>':'<div class="upg-tag one">1×</div>'}
      `;
      card.addEventListener('click',()=>{
        this._applyUpgrade(u.id);
        $('upgrade-overlay').classList.add('hidden');
        this.paused=false;
        this.startMs=performance.now();
        showLevelFlash(this.level);
        this._updateHUD();
      });
      box.appendChild(card);
    });
    $('upgrade-overlay').classList.remove('hidden');
  }

  // ── HUD ──────────────────────────────────────────
  _updateHUD(){
    $('h-level').textContent=this.level;
    $('h-score').textContent=this.score;
    $('h-time').textContent=Math.ceil(this.timeLeft);
    $('h-oil').textContent=this._oilCount();

    // HP
    const hpEl=$('h-hp');
    if(hpEl){
      hpEl.innerHTML='';
      for(let i=0;i<this.maxHp;i++){
        const d=document.createElement('div');
        d.className='hp-px'+(i<this.hp?'':' empty');
        hpEl.appendChild(d);
      }
    }

    // Skill C
    const now=performance.now();
    const cdC=this.skillCCd-(now-this.skillCUsedMs);
    const pC=cdC<=0?1:1-cdC/this.skillCCd;
    const bC=$('skill-bar'),lC=$('skill-label'),spC=$('sp-c');
    if(bC){bC.style.width=`${pC*100}%`;bC.classList.toggle('cd',cdC>0);}
    if(spC) spC.classList.toggle('cd',cdC>0);
    if(lC){
      lC.classList.toggle('cd',cdC>0);
      const d=this.skillArea*2;
      lC.textContent=cdC<=0?`AREA ${d}x${d} READY!`:`AREA CLEAR ${Math.ceil(cdC/1000)}s`;
    }

    // Skill V
    const cdV=this.skillVCd-(now-this.skillVUsedMs);
    const pV=cdV<=0?1:1-cdV/this.skillVCd;
    const boosted=now-this.skillVUsedMs<this.skillVDur;
    const bV=$('skill-bar-v'),lV=$('skill-label-v'),spV=$('sp-v');
    if(bV){bV.style.width=`${pV*100}%`;bV.classList.toggle('cd',cdV>0&&!boosted);bV.classList.toggle('active',boosted);}
    if(spV) spV.classList.toggle('cd',cdV>0&&!boosted);
    if(lV){
      lV.classList.toggle('cd',cdV>0&&!boosted);
      lV.classList.toggle('active',boosted);
      if(boosted) lV.textContent=`BOOSTING! ${Math.ceil((this.skillVDur-(now-this.skillVUsedMs))/1000)}s`;
      else if(cdV<=0) lV.textContent='SPEED BOOST READY!';
      else lV.textContent=`BOOST ${Math.ceil(cdV/1000)}s`;
    }

    // Boss bar
    const bw=$('boss-hp-wrap');
    if(bw){
      bw.style.display=this.boss?'flex':'none';
      if(this.boss){
        $('boss-hp-bar').style.width=`${(this.boss.hp/this.boss.maxHp)*100}%`;
        $('boss-hp-text').textContent=`${this.boss.hp}/${this.boss.maxHp}`;
      }
    }

    // Badges
    const bdg=$('upgrade-badges');
    if(bdg){
      bdg.innerHTML='';
      for(const[id,cnt]of Object.entries(this.upgrades)){
        if(cnt<=0) continue;
        const u=UPGRADE_DB.find(x=>x.id===id);
        if(!u) continue;
        const b=document.createElement('div');
        b.className='upg-badge';
        b.style.borderColor=u.color;
        b.style.color=u.color;
        b.title=u.name;
        b.textContent=cnt>1?`${u.icon}x${cnt}`:u.icon;
        bdg.appendChild(b);
      }
    }
  }

  // ═════════════════════════════════════════════════
  //  DRAW — Comic Pixel Style
  // ═════════════════════════════════════════════════
  _draw(now){
    const ctx=this.ctx;

    // 1. Background (water+grid snapshot)
    ctx.putImageData(this.bgSnap,0,0);

    // 2. Animated wave lines
    this.waveT+=0.02;
    ctx.fillStyle=PC.waveLight;
    ctx.globalAlpha=0.12;
    for(let r=3;r<ROWS-1;r+=6){
      const shift=Math.round(Math.sin(this.waveT+r*0.25)*3);
      for(let c=1;c<COLS-1;c++){
        if(!this.land[r][c])
          ctx.fillRect((c*CS)+shift, r*CS, CS*2, 1);
      }
    }
    ctx.globalAlpha=1;

    // 3. Oil — pixel blobs with outline effect
    // Draw dark base first
    ctx.fillStyle=PC.oil;
    for(let r=0;r<ROWS;r++)
      for(let c=0;c<COLS;c++)
        if(this.grid[r][c]) ctx.fillRect(c*CS,r*CS,CS,CS);
    // Mid layer
    ctx.fillStyle=PC.oilMid;
    for(let r=0;r<ROWS;r++)
      for(let c=0;c<COLS;c++)
        if(this.grid[r][c]&&!this.grid[r-1]?.[c]) ctx.fillRect(c*CS,r*CS,CS,2); // top edge highlight
    // Sheen dots
    ctx.fillStyle=PC.oilSheen;
    for(let r=0;r<ROWS;r++)
      for(let c=0;c<COLS;c++)
        if(this.grid[r][c]&&(r*7+c*3)%11===0) ctx.fillRect(c*CS+1,r*CS+1,CS-2,CS-2);

    // 4. Skill C flash
    if(this.skillCFlashMs){
      const age=now-this.skillCFlashMs;
      if(age<500){
        const a=(1-age/500)*0.5;
        const half=this._skillCHalf;
        const cr=this.pr+PLAYER_CELLS/2, cc=this.pc+PLAYER_CELLS/2;
        // Comic-style: pixelated dashed box
        ctx.save(); ctx.globalAlpha=a;
        ctx.fillStyle='#22ff88';
        ctx.fillRect((cc-half)*CS,(cr-half)*CS,half*2*CS,half*2*CS);
        ctx.globalAlpha=Math.min(1,a*3);
        ctx.strokeStyle='#22ff88'; ctx.lineWidth=2;
        ctx.setLineDash([4,4]);
        ctx.strokeRect((cc-half)*CS,(cr-half)*CS,half*2*CS,half*2*CS);
        ctx.setLineDash([]);
        ctx.restore();
      } else this.skillCFlashMs=null;
    }

    // 5. Boost aura (pixelated rings)
    const boosted=now-this.skillVUsedMs<this.skillVDur;
    if(boosted){
      const age=now-this.skillVUsedMs;
      const a=0.6*(1-age/this.skillVDur)+0.2;
      const px=this.pc*CS, py=this.pr*CS;
      const pw=PLAYER_CELLS*CS, ph=PLAYER_CELLS*CS;
      ctx.save(); ctx.globalAlpha=a;
      ctx.strokeStyle='#00ccff'; ctx.lineWidth=2;
      ctx.setLineDash([2,2]);
      ctx.strokeRect(px-3,py-3,pw+6,ph+6);
      ctx.setLineDash([]);
      ctx.restore();
    }

    // 6. Heal orbs
    for(const o of this.orbs){
      if(!o.alive) continue;
      const pulse=Math.floor((now-o.t)/200)%2===0;
      const x=o.c*CS-CS, y=o.r*CS-CS;
      ctx.fillStyle=pulse?PC.heal:PC.healDark;
      // pixel cross shape
      ctx.fillRect(x+CS,y,    CS, CS*3);  // vertical
      ctx.fillRect(x,   y+CS, CS*3, CS);  // horizontal
      // white center
      ctx.fillStyle='#ffffff';
      ctx.fillRect(x+CS,y+CS,CS,CS);
    }

    // 7. Bullets
    for(const b of this.bullets){
      if(b.isPlayer){
        ctx.fillStyle=PC.bPlayer;
        // elongated pixel bullet
        const bx=Math.floor(b.c)*CS, by=Math.floor(b.r)*CS;
        const isVert=Math.abs(b.dr)>Math.abs(b.dc);
        if(isVert){ctx.fillRect(bx+1,by,CS-2,CS*2);}
        else      {ctx.fillRect(bx,by+1,CS*2,CS-2);}
      } else if(b.isBoss){
        ctx.fillStyle=PC.bBoss;
        ctx.fillRect(Math.floor(b.c)*CS-1,Math.floor(b.r)*CS-1,CS+2,CS+2);
      } else {
        ctx.fillStyle=PC.bEnemy;
        ctx.fillRect(Math.floor(b.c)*CS,Math.floor(b.r)*CS,CS,CS);
      }
    }

    // 8. Enemies
    for(const e of this.enemies) this._drawEnemyPx(ctx,e.c*CS,e.r*CS,ENEMY_CELLS*CS);

    // 9. Boss
    if(this.boss) this._drawBossPx(ctx,this.boss);

    // 10. Player
    this._drawPlayerPx(ctx,this.pc*CS,this.pr*CS,PLAYER_CELLS*CS,boosted);
  }

  // ── PIXEL PLAYER SHIP ───────────────────────────
  _drawPlayerPx(ctx,x,y,size,boosted){
    const S=CS; // 1 cell
    const col=Math.floor(x/S), row=Math.floor(y/S);
    const P=PLAYER_CELLS;

    // Shadow / outline (1px border in dark color)
    ctx.fillStyle=PC.pOutline;
    ctx.fillRect(x-1,y-1,P*S+2,P*S+2);

    // Hull — teal fill
    ctx.fillStyle=boosted?'#00aaee':PC.pHull;
    ctx.fillRect(x,y,P*S,P*S);

    // Bow — pointed top (triangle by removing corners)
    ctx.fillStyle=boosted?'#004466':PC.pOutline;
    ctx.fillRect(x,         y,         S,  S);  // top-left corner → dark
    ctx.fillRect(x+P*S-S,   y,         S,  S);  // top-right corner → dark
    // Restore bow tip
    ctx.fillStyle=boosted?'#00aaee':PC.pHull;
    ctx.fillRect(x+S,       y,         P*S-2*S, S);  // bow row

    // Deck stripe (lighter top row)
    ctx.fillStyle=PC.pDeck;
    ctx.fillRect(x+S, y+S, P*S-2*S, S);

    // Cabin block
    ctx.fillStyle=PC.pCabin;
    ctx.fillRect(x+S, y+S*2, P*S-2*S, S);

    // Window pixel
    ctx.fillStyle=PC.pWindow;
    ctx.fillRect(x+Math.floor(P/2)*S, y+S*2, S, S);

    // Stern bottom
    ctx.fillStyle=boosted?'#00aaee':PC.pHull;
    ctx.fillRect(x, y+P*S-S, P*S, S);

    // Boost flames
    if(boosted){
      const frame=Math.floor(performance.now()/80)%2;
      ctx.fillStyle=frame?'#00ffff':'#ffffff';
      ctx.fillRect(x+S,     y+P*S,   S, S);
      ctx.fillRect(x+P*S-2*S, y+P*S, S, S);
    }
  }

  // ── PIXEL ENEMY SHIP ────────────────────────────
  _drawEnemyPx(ctx,x,y,size){
    const S=CS, P=ENEMY_CELLS;

    ctx.fillStyle=PC.eDark;
    ctx.fillRect(x-1,y-1,P*S+2,P*S+2);

    ctx.fillStyle=PC.eHull;
    ctx.fillRect(x,y,P*S,P*S);

    // Triangular bow
    ctx.fillStyle=PC.eDark;
    ctx.fillRect(x,y,S,S);
    ctx.fillRect(x+P*S-S,y,S,S);

    // Accent stripe
    ctx.fillStyle=PC.eAccent;
    ctx.fillRect(x+S,y+S,P*S-2*S,S);

    // Turret dot
    ctx.fillStyle='#111';
    ctx.fillRect(x+Math.floor(P/2)*S-S,y+Math.floor(P/2)*S-S,S*2,S*2);
    ctx.fillStyle=PC.eLight;
    ctx.fillRect(x+Math.floor(P/2)*S,y+Math.floor(P/2)*S-S,S,S);

    // Blink light
    if(Math.floor(performance.now()/400)%2===0){
      ctx.fillStyle='#ff3300';
      ctx.fillRect(x+P*S-S,y,S,S);
    }
  }

  // ── PIXEL BOSS ──────────────────────────────────
  _drawBossPx(ctx,b){
    const S=CS, P=BOSS_CELLS;
    const x=b.c*S*1, y=b.r*S*1;
    const px=b.c*CS, py=b.r*CS;
    const phase=b.phase||0;

    // Outer glow (pixel box, alternating)
    const glowFrame=Math.floor(performance.now()/120)%2;
    ctx.fillStyle=glowFrame?PC.bGlow:PC.bAccent;
    ctx.globalAlpha=0.25;
    ctx.fillRect(px-CS,py-CS,P*CS+2*CS,P*CS+2*CS);
    ctx.globalAlpha=1;

    // Main hull — dark purple
    ctx.fillStyle=PC.bDark;
    ctx.fillRect(px,py,P*CS,P*CS);

    // Mid section brighter
    ctx.fillStyle=PC.bCore;
    ctx.fillRect(px+CS*2,py+CS*2,P*CS-CS*4,P*CS-CS*4);

    // Diagonal corner cuts (pixel art style)
    ctx.fillStyle=PC.bDark;
    ctx.fillRect(px,py,CS*2,CS*2);
    ctx.fillRect(px+P*CS-CS*2,py,CS*2,CS*2);
    ctx.fillRect(px,py+P*CS-CS*2,CS*2,CS*2);
    ctx.fillRect(px+P*CS-CS*2,py+P*CS-CS*2,CS*2,CS*2);

    // Accent border strips
    ctx.fillStyle=PC.bAccent;
    ctx.fillRect(px+CS,py,P*CS-CS*2,CS);         // top
    ctx.fillRect(px+CS,py+P*CS-CS,P*CS-CS*2,CS); // bottom
    ctx.fillRect(px,py+CS,CS,P*CS-CS*2);          // left
    ctx.fillRect(px+P*CS-CS,py+CS,CS,P*CS-CS*2); // right

    // Three turrets
    const tc=Math.floor(P/2)*CS;
    for(const[tx]of[[-CS*3],[0],[CS*3]]){
      ctx.fillStyle='#110022';
      ctx.fillRect(px+tc+tx-CS, py+tc-CS, CS*2, CS*2);
      ctx.fillStyle=PC.bAccent;
      // barrel pointing at player
      const ang=Math.atan2(this.pr-b.r,this.pc-b.c);
      const bdr=Math.round(Math.sin(ang)),bdc=Math.round(Math.cos(ang));
      ctx.fillRect(px+tc+tx+(bdc>0?CS:bdc<0?-CS:0), py+tc+(bdr>0?CS:bdr<0?-CS:0), CS, CS);
    }

    // Blinking lights on corners
    const blink=Math.floor(performance.now()/300)%2===0;
    ctx.fillStyle=blink?'#ff44ff':'#ff00aa';
    ctx.fillRect(px+CS,    py+CS,     CS,CS);
    ctx.fillRect(px+P*CS-CS*2,py+CS, CS,CS);
    ctx.fillRect(px+CS,    py+P*CS-CS*2, CS,CS);
    ctx.fillRect(px+P*CS-CS*2,py+P*CS-CS*2,CS,CS);

    // HP bar (on canvas, above boss)
    const hf=b.hp/b.maxHp;
    const bw=P*CS;
    ctx.fillStyle='#000';ctx.fillRect(px,py-CS*3,bw,CS*2);
    ctx.fillStyle=hf>0.5?'#cc44ff':hf>0.25?'#ff8800':'#ff2244';
    ctx.fillRect(px,py-CS*3,Math.round(bw*hf),CS*2);
    ctx.strokeStyle=PC.bAccent;ctx.lineWidth=1;
    ctx.strokeRect(px,py-CS*3,bw,CS*2);
  }

  // ── Misc ────────────────────────────────────────
  _flashDmg(){
    const w=document.getElementById('canvas-wrap');
    w.classList.remove('dmg-flash');void w.offsetWidth;w.classList.add('dmg-flash');
    setTimeout(()=>w.classList.remove('dmg-flash'),300);
  }
  _showGameOver(){
    $('ov-title').textContent='GAME OVER';
    $('ov-score').textContent=this.score;
    $('ov-lvl').textContent=this.level;
    $('overlay').classList.remove('hidden');
  }
  restart(){
    $('overlay').classList.add('hidden');
    $('upgrade-overlay').classList.add('hidden');
    for(const k of Object.keys(this.upgrades)) this.upgrades[k]=0;
    this.level=1;this._init();
  }

  // ── Loop ────────────────────────────────────────
  _tick(now){
    const dt=Math.min(now-(this._prev||now),50);
    this._prev=now;
    if(!this.gameOver&&!this.paused){
      this._updateTime(now);
      this._processMove(dt);
      this._spreadOil(now);
      this._updateEnemies(now);
      this._enemyShoot(now);
      this._bossShoot(now);
      this._updateBullets();
      this._updateHUD();
    }
    this._draw(now);
    if(this.gameOver) this._showGameOver();
    requestAnimationFrame(this._tick);
  }
}

// ─── HELPERS ─────────────────────────────────────────
function showLevelFlash(level){
  const el=$('lvl-flash');
  const isBoss=level%10===0;
  el.textContent=isBoss?`!! BOSS LVL ${level} !!`:`LEVEL ${level}!`;
  el.style.color=isBoss?'#cc44ff':'#22ff88';
  el.classList.remove('hidden');
  el.style.animation='none';void el.offsetWidth;el.style.animation='';
  setTimeout(()=>el.classList.add('hidden'),1600);
}

// ─── BOOT ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  const canvas = $('gc');
  const wrap   = document.getElementById('canvas-wrap');

  function fitCanvas(){
    // canvas internal resolution stays W×H
    // CSS: stretch to fill wrap while keeping aspect ratio
    const ww = wrap.clientWidth;
    const wh = wrap.clientHeight;
    const scale = Math.min(ww/W, wh/H);
    const dw = Math.floor(W*scale);
    const dh = Math.floor(H*scale);
    canvas.style.width  = dw+'px';
    canvas.style.height = dh+'px';
    // center it
    canvas.style.marginLeft = Math.floor((ww-dw)/2)+'px';
    canvas.style.marginTop  = Math.floor((wh-dh)/2)+'px';
  }

  fitCanvas();
  window.addEventListener('resize', fitCanvas);
  window._game = new Game();
});

</script>
